<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Info — WILD! Healing: A Harvest of Medicine</title>
<!--
  /info is a legacy URL from the 2025 "WILD! Miracles" site. It still ranks and
  still gets clicked, but the 2026 site is a hash-routed SPA where the Info page
  lives at /#/info — so this path would otherwise 404 and Google would drop it.

  Serving a real 200 page that redirects (rather than letting it 404) keeps the
  URL alive and lets Google consolidate it into the site. The canonical points at
  the homepage because Google ignores the #fragment — /#/info and / are one URL
  to a crawler.
-->
<link rel="canonical" href="https://wildgala.com/">
<meta http-equiv="refresh" content="0; url=/#/info">
<meta name="description" content="WILD! Healing — A Harvest of Medicine. Online September 9–10, 2026; on the land at Restore Forward, Ava, New York, September 12.">
<script>window.location.replace("/#/info" + window.location.search);</script>
<style>
  body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
        background:#ECE3CF; color:#25322F; text-align:center; padding:2rem;
        font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif; }
  a{ color:#B0654A; }
</style>
</head>
<body>
  <p>The Info page has moved &mdash; <a href="/#/info">continue to WILD! Healing</a>.</p>
</body>
</html>
