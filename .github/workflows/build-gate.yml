name: Publish index.html

# Publishes index.html from site-source.html on every push (no password gate).
# Chats only ever edit site-source.html; this workflow keeps index.html in sync so
# the generated file never causes merge conflicts between parallel chats.

on:
  push:
    branches: [main]
    paths:
      - "site-source.html"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: publish-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish index.html (ungated copy of site-source.html)
        run: cp site-source.html index.html

      - name: Commit index.html if it changed
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "ci: publish index.html from site-source.html"
          for i in 1 2 3 4 5; do
            if git push; then echo "pushed."; exit 0; fi
            echo "push rejected, rebasing and retrying ($i)…"
            git pull --rebase --autostash
          done
          echo "could not push after retries"; exit 1
